

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background-image: url('/static/cyber_login.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        ::placeholder {
            font-style: italic;
        }

        .auth-container {
            width: 500px;
            margin: 50px auto;
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            font-size: 60px;
            color: #f3eeee;
        }

        label {
            display: block;
            margin-top: 10px;
            color: white;
            font-size: 20px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 3px;
        }

        .login {
            margin-top: 10px;
            padding: 12px;
            border-radius: 20px;
            width: 100%;
            font-size: 16px;
            background-color: black;
            color: white;
            border: none;
        }

        .login:hover {
            background-color: #326499;
        }

        .existing {
            color: white;
            text-align: center;
            margin-top: 10px;
        }

        .signIn {
            color: aqua;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="auth-container">
    <h2>Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit" class="login">Login</button>
    </form>

    <p class="existing">
        Don't have an account?
        <a href="{{ url_for('signin') }}" class="signIn">Sign up</a>
    </p>
</div>

</body>
</html>
